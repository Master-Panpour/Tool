name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shell tooling
        run: sudo apt-get update && sudo apt-get install -y bats jq shellcheck shfmt
      - name: Bash syntax
        run: find . -type f \( -name '*.sh' -o -name '*.bash' -o -name aegiscope \) -not -path './.git/*' -print0 | xargs -0 bash -n
      - name: ShellCheck
        run: find . -type f \( -name '*.sh' -o -name '*.bash' -o -name aegiscope \) -not -path './.git/*' -print0 | xargs -0 shellcheck --severity=warning
      - name: shfmt
        run: shfmt -d -i 2 -ci aegiscope required_perms.sh bin lib tests
      - name: Bats
        run: bats tests
